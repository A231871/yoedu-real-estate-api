spring:
  application:
    name: yoedu-real-estate-api

  datasource:
    url: jdbc:postgresql://localhost:5432/yoedu-real-estate
    username: postgres
    password: postgres # Change this to your local postgres password if needed
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

app:
  jwt:
    issuer: estate-api
    secret: estate-secret-key-12345678901234567890
    access-token-ttl-minutes: 480
    refresh-token-ttl-days: 7
